<p> 
La Salamandra es un software de automatización de radio gratuito para Windows. 
</p> 

<p> 
Projetado para radios que necesita un software simple, fácil y estável para programar suas 
transmisiones. 
</p>

<h2 class="title">Funcionalidades</h2> 

<ul> 
<li>Reproductor con soporte para formatos de audio más comunes (wav, mp3, wma, ogg y flac)</li> 

<li>Cartucheira con opciones avanzadas para reproducción de audios avulsos.</li> 

<li>Diversos modos de selección de faixas, como aleatorio, embaralhar o manual para mayor control de 
programación.</li> 

<li>Faixas especiais, como locução de horário, archivos de áudio aleatórios de uma pasta, listas rotativas 
ou secuenciais para blocos de anuncios o programas.</li> 

<li>Un programador de eventos versátil, para agendar faixas, listas de reproducción, audios, programas, en un día e 
hora agendados ou de forma periódica, como días de la semana o horas del día.</li> 

<li>Configuraciones de mezcla para grupos de archivos, para aplicar diferentes parámetros a música, 
comerciais, vinhetas, entre outros.</li> 

<li>Un reproductor simplificado para escuchar audio en otras palabras.</li> 

<li>Gerador de archivos de registro, para registrar cualquier actividad o errores del reproductor.</li> 
</ul>
